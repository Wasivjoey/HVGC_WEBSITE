{% extends "public/base_public.html" %}
{% block title %}{{ p['title'] }} · {{ S['church_name'] }}{% endblock %}
{% block body %}
<article class="article">
  <div class="container article-inner">
    <a href="{{ url_for('blog') }}" class="back-link">← All news</a>
    <p class="eyebrow">{{ p['created_at']|pretty }}</p>
    <h1>{{ p['title'] }}</h1>
    {% if p['image'] %}<img class="article-img" src="{{ url_for('static', filename=p['image']) }}" alt="">{% endif %}
    <div class="article-body prewrap">{{ p['body'] }}</div>
    <a href="{{ url_for('blog') }}" class="btn btn-ghost" style="margin-top:30px;">← Back to news</a>
  </div>
</article>
{% endblock %}
