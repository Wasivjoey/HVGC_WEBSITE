<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Manage · {{ S['church_name'] }}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}">
</head>
<body>
{% if is_admin %}
<header class="adm-top">
  <a class="adm-brand" href="{{ url_for('admin_dashboard') }}"><img class="adm-logo" src="{{ url_for('static', filename='img/logo.png') }}" alt=""> Website Manager</a>
  <nav class="adm-nav">
    <a href="{{ url_for('admin_dashboard') }}">Home</a>
    <a href="{{ url_for('home') }}" target="_blank">View site ↗</a>
    <a href="{{ url_for('admin_password') }}">Password</a>
    <a href="{{ url_for('admin_logout') }}">Sign out</a>
  </nav>
</header>
{% endif %}

<main class="adm-main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flashes">
      {% for cat, msg in messages %}<div class="flash flash-{{ cat }}">{{ msg }}</div>{% endfor %}
    </div>
    {% endif %}
  {% endwith %}
  {% block body %}{% endblock %}
</main>
</body>
</html>
