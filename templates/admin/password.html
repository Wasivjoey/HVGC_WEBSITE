{% extends "admin/base_admin.html" %}
{% block body %}
<a class="back" href="{{ url_for('admin_dashboard') }}">← Back</a>
<div class="adm-head"><h1>🔑 Change your password</h1></div>
<form method="post" class="panel" style="max-width:440px;">
  <label>Current password</label>
  <input type="password" name="current" required>
  <label>New password</label>
  <input type="password" name="new" required>
  <label>Confirm new password</label>
  <input type="password" name="confirm" required>
  <button class="btn btn-primary" style="margin-top:16px;">Update password</button>
</form>
{% endblock %}
