# Render.com Blueprint for the Harbour View Gospel Chapel website.
# New → Blueprint, point at this repo, Apply. Provisions Postgres + the web app.
databases:
  - name: hvgc-website-db
    databaseName: hvgc
    user: hvgc
    plan: free

services:
  - type: web
    name: harbour-view-chapel
    runtime: python
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Postgres connection — sermon files & photos are stored in the database,
      # so they persist across deploys (no disk needed).
      - key: DATABASE_URL
        fromDatabase:
          name: hvgc-website-db
          property: connectionString
